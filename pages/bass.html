<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soundory - Basses</title>

  <link rel="stylesheet" href="../reset.css" />
  <link rel="stylesheet" href="../style.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- ================= NAVBAR ================= -->
<div class="navbar">

  <div class="logo">
    <a href="../index.html">
      <img src="../images/logo.png">
      Soundory
    </a>
  </div>

  <div class="sections">

    <h2><a href="guitar.html">Guitars</a></h2>
    <h2><a href="bass.html">Basses</a></h2>
    <h2><a href="drum.html">Drums</a></h2>
    <h2><a href="piano.html">Piano</a></h2>

    <div class="search-box">
      <input type="text" class="search_bar" placeholder="Search..">
      <button>Search</button>
    </div>

  </div>

</div>

<!-- ================= MOBILE BANNER ================= -->
<div class="mobile-banner">
  🎵 Mobile Exclusive Deals Available!
</div>

<!-- ================= SLIDER ================= -->
<section class="container">

  <div id="bassCarousel" class="carousel slide" data-bs-ride="carousel">

    <!-- DOT BUTTONS -->
    <div class="carousel-indicators">
      <button type="button" data-bs-target="#bassCarousel" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>

      <button type="button" data-bs-target="#bassCarousel" data-bs-slide-to="1" aria-label="Slide 2"></button>

      <button type="button" data-bs-target="#bassCarousel" data-bs-slide-to="2" aria-label="Slide 3"></button>
    </div>

    <!-- SLIDES -->
    <div class="carousel-inner">

      <div class="carousel-item active">
        <img src="../images/bass_special.jpg" class="d-block w-100 carousel-img" alt="Bass Special">
      </div>

      <div class="carousel-item">
        <img src="../images/bass_best.jpg" class="d-block w-100 carousel-img" alt="Bass Best">
      </div>

      <div class="carousel-item">
        <img src="../images/bass.jpg" class="d-block w-100 carousel-img" alt="Bass">
      </div>

    </div>

    <!-- ARROWS -->
    <button class="carousel-control-prev" type="button" data-bs-target="#bassCarousel" data-bs-slide="prev">
      <span class="carousel-control-prev-icon"></span>
    </button>

    <button class="carousel-control-next" type="button" data-bs-target="#bassCarousel" data-bs-slide="next">
      <span class="carousel-control-next-icon"></span>
    </button>

  </div>

  <!-- CTA -->
  <div class="cta_button">
    <button>Shop Basses</button>
  </div>

</section>

<!-- ================= PRODUCTS ================= -->
<div class="headings">

  <h2>Featured Items</h2>

  <div class="container">

    <div class="row g-4 justify-content-center">

      <div class="col-12 col-sm-6 col-lg-3">
        <div class="product">
          <img src="../images/alder-4.webp">
          <p><b>Marcus Miller</b> V7 Alder-4 AWH</p>
          <div class="price">€ 477</div>
          <button>Add to cart</button>
        </div>
      </div>

      <div class="col-12 col-sm-6 col-lg-3">
        <div class="product">
          <img src="../images/JB-75MN.webp">
          <p><b>Harley Benton</b> JB-75MN SB</p>
          <div class="price">€ 177</div>
          <button>Add to cart</button>
        </div>
      </div>

      <div class="col-12 col-sm-6 col-lg-3">
        <div class="product">
          <img src="../images/V8-4_NT.webp">
          <p><b>Marcus Miller</b> V8-4 NT</p>
          <div class="price">€ 655</div>
          <button>Add to cart</button>
        </div>
      </div>

      <div class="col-12 col-sm-6 col-lg-3">
        <div class="product">
          <img src="../images/player-2.webp">
          <p><b>Fender</b> Player II Jazz Bass</p>
          <div class="price">€ 795</div>
          <button>Add to cart</button>
        </div>
      </div>

    </div>

  </div>

</div>

<!-- ================= MASCOT ================= -->
<div class="mascot">

  <img src="../images/mascot.png">

  <div class="mascot-message">
    🎸 Welcome to Soundory! Check our latest deals!
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
