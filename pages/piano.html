<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soundory - Piano</title>

  <link rel="stylesheet" href="../reset.css" />
  <link rel="stylesheet" href="../style.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- ================= NAVBAR ================= -->
<div class="navbar">

  <div class="logo">
    <a href="../index.html">
      <img src="../images/logo.png">
      Soundory
    </a>
  </div>

  <div class="sections">

    <h2><a href="guitar.html">Guitars</a></h2>
    <h2><a href="bass.html">Basses</a></h2>
    <h2><a href="drum.html">Drums</a></h2>
    <h2><a href="piano.html">Piano</a></h2>

    <div class="search-box">
      <input type="text" class="search_bar" placeholder="Search..">
      <button>Search</button>
    </div>

  </div>

</div>

<!-- ================= MOBILE BANNER ================= -->
<div class="mobile-banner">
  🎵 Mobile Exclusive Deals Available!
</div>

<!-- ================= SLIDER ================= -->
<section class="container">

  <div id="pianoCarousel" class="carousel slide" data-bs-ride="carousel">

    <!-- DOT BUTTONS -->
    <div class="carousel-indicators">

      <button type="button"
              data-bs-target="#pianoCarousel"
              data-bs-slide-to="0"
              class="active"
              aria-current="true"
              aria-label="Slide 1"></button>

      <button type="button"
              data-bs-target="#pianoCarousel"
              data-bs-slide-to="1"
              aria-label="Slide 2"></button>

      <button type="button"
              data-bs-target="#pianoCarousel"
              data-bs-slide-to="2"
              aria-label="Slide 3"></button>

    </div>

    <!-- SLIDES -->
    <div class="carousel-inner">

      <div class="carousel-item active">
        <img src="../images/piano_1.webp"
             class="d-block w-100 carousel-img"
             alt="Piano 1">
      </div>

      <div class="carousel-item">
        <img src="../images/piano_2.png"
             class="d-block w-100 carousel-img"
             alt="Piano 2">
      </div>

      <div class="carousel-item">
        <img src="../images/piano_3.jpg"
             class="d-block w-100 carousel-img"
             alt="Piano 3">
      </div>

    </div>

    <!-- ARROWS -->
    <button class="carousel-control-prev"
            type="button"
            data-bs-target="#pianoCarousel"
            data-bs-slide="prev">

      <span class="carousel-control-prev-icon"></span>

    </button>

    <button class="carousel-control-next"
            type="button"
            data-bs-target="#pianoCarousel"
            data-bs-slide="next">

      <span class="carousel-control-next-icon"></span>

    </button>

  </div>

  <!-- CTA -->
  <div class="cta_button">
    <button>Shop Pianos</button>
  </div>

</section>

<!-- ================= PRODUCTS ================= -->
<div class="headings">

  <h2>Featured Items</h2>

  <div class="container">

    <div class="row g-4 justify-content-center">

      <div class="col-12 col-sm-6 col-lg-3">
        <div class="product">
          <img src="../images/dp_95.webp">
          <p><b>Thomann</b> DP-95 B</p>
          <div class="price">€ 545</div>
          <button>Add to cart</button>
        </div>
      </div>

      <div class="col-12 col-sm-6 col-lg-3">
        <div class="product">
          <img src="../images/ydp-165.webp">
          <p><b>Yamaha</b> YDP-165</p>
          <div class="price">€ 1,090</div>
          <button>Add to cart</button>
        </div>
      </div>

      <div class="col-12 col-sm-6 col-lg-3">
        <div class="product">
          <img src="../images/ydp-145.webp">
          <p><b>Yamaha</b> YDP-145</p>
          <div class="price">€ 822</div>
          <button>Add to cart</button>
        </div>
      </div>

      <div class="col-12 col-sm-6 col-lg-3">
        <div class="product">
          <img src="../images/p-525.webp">
          <p><b>Yamaha</b> P-525</p>
          <div class="price">€ 1,777</div>
          <button>Add to cart</button>
        </div>
      </div>

    </div>

  </div>

</div>

<!-- ================= MASCOT ================= -->
<div class="mascot">

  <img src="../images/mascot.png">

  <div class="mascot-message">
    🎸 Welcome to Soundory! Check our latest deals!
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
